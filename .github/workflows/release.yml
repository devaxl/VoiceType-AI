name: Release

# Builds VoiceType AI installers on Windows + macOS (Apple Silicon and Intel) and publishes
# them to a GitHub Release. Triggers on a version tag (v*) or manually via the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (e.g. v0.1.0)"
        required: false
        default: ""

jobs:
  release:
    permissions:
      contents: write # tauri-action creates the Release and uploads assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (.dmg / .app)
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel (.dmg / .app)
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest # x64 (.msi + NSIS -setup.exe), default MSVC toolchain
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # CI relies on the DEFAULT target dir — the machine-specific
          # src-tauri/.cargo/config.toml override stays gitignored.
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          releaseName: "VoiceType AI ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}"
          releaseBody: |
            VoiceType AI — Windows-first voice dictation with AI refinement.

            Download the installer for your platform below:
            - **Windows:** `.msi` or the NSIS `-setup.exe`
            - **macOS (Apple Silicon):** `aarch64` `.dmg`
            - **macOS (Intel):** `x64` `.dmg`

            > These builds are **not code-signed** yet:
            > - Windows: SmartScreen may warn — click **More info → Run anyway**.
            > - macOS: unsigned — **right-click the app → Open** to bypass Gatekeeper.

            Bring your own OpenAI API key (stored in your OS keychain). For sensitive
            use, point it at an OpenAI workspace with Zero-Data-Retention.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
